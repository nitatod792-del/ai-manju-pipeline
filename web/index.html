<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>AI漫剧项目看板</title>
  <link rel="stylesheet" href="styles.css?v=20260309m7" />
</head>
<body>
  <main class="container">
    <h1>AI漫剧项目看板</h1>
    <p id="meta" class="muted">加载中...</p>

    <section class="uploader card">
      <h2>上传剧本（Step 1）</h2>
      <details class="card-lite">
        <summary>高级字段（可不填，系统会自动生成）</summary>
        <div class="form-row">
          <input id="projectId" placeholder="项目ID（可空）" />
          <input id="projectName" placeholder="项目名（可空）" />
        </div>
        <div class="form-row">
          <input id="projectStyle" placeholder="风格（可空，默认风格）" />
          <input id="scriptTitle" placeholder="剧本标题（可空）" />
        </div>
      </details>
      <div class="form-row">
        <input id="scriptFile" type="file" accept=".txt,.md,text/plain,text/markdown" />
        <button id="uploadBtn">上传文件并记录</button>
      </div>
      <textarea id="scriptText" rows="8" placeholder="或直接粘贴剧本文本（不上传文件也可以）"></textarea>
      <div class="form-row single">
        <button id="pasteBtn">保存粘贴文本并记录</button>
      </div>
      <p class="muted small">支持两种方式：上传文件 或 直接粘贴文本。当前版本会保存到当前浏览器本地，用于快速启动项目。</p>
      <div id="uploadMsg" class="small"></div>
    </section>

    <section id="cards" class="grid"></section>

    <section class="card">
      <h2>本地上传记录</h2>
      <div id="uploads"></div>
    </section>
  </main>
  <script src="app.js?v=20260309m7"></script>
</body>
</html>
